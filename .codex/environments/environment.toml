[[actions]]
name = "run real anki"
icon = "debug"
command = '''
set -euo pipefail

ROOT="$(git rev-parse --show-toplevel)"
cd "$ROOT"

python3 scripts/dev.py link-addon
python3 scripts/dev.py build

osascript -e 'tell application "Anki" to quit' >/dev/null 2>&1 || true

for _ in $(seq 1 20); do
  if ! pgrep -f "/Applications/Anki.app/Contents/MacOS" >/dev/null; then
    break
  fi
  sleep 0.25
done

if pgrep -f "/Applications/Anki.app/Contents/MacOS" >/dev/null; then
  pkill -9 -f "/Applications/Anki.app/Contents/MacOS" || true
fi

open -a Anki
'''
