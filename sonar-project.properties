sonar.projectKey=anki-audio-quick-editor
sonar.projectName=Anki Audio Quick Editor
sonar.projectVersion=0.1.0

sonar.sources=addon/anki_audio_quick_editor,settings_ui/src
sonar.tests=tests,e2e,settings_ui/tests

sonar.python.version=3.13
sonar.python.coverage.reportPaths=coverage.xml
sonar.javascript.lcov.reportPaths=settings_ui/coverage/lcov.info
sonar.typescript.tsconfigPaths=settings_ui/tsconfig.json
sonar.qualitygate.wait=true
sonar.qualitygate.timeout=300

sonar.exclusions=addon/anki_audio_quick_editor/vendor/**,addon/anki_audio_quick_editor/templates/**,addon/anki_audio_quick_editor/contracts_generated.py,settings_ui/node_modules/**,settings_ui/dist/**,settings_ui/src/lib/generated/**
sonar.coverage.exclusions=tests/**,e2e/**,settings_ui/tests/**,addon/anki_audio_quick_editor/templates/**,addon/anki_audio_quick_editor/contracts_generated.py,settings_ui/src/lib/generated/**
sonar.test.inclusions=tests/**/*.py,e2e/**/*.py,settings_ui/tests/**/*.ts
sonar.issue.ignore.multicriteria=e1
sonar.issue.ignore.multicriteria.e1.ruleKey=typescript:S7764
sonar.issue.ignore.multicriteria.e1.resourceKey=settings_ui/src/editor-inline/**
